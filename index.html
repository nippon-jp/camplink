<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CAMP LINK - 北広島クワカブキャンプ場 予約＆コミュニティ</title>
  
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Google Fonts: Plus Jakarta Sans & Noto Sans JP -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
  
  <!-- React & ReactDOM (Production) CDN -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- Babel CDN (ブラウザ内JSXコンパイル用) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- Firebase App & Services (Compat版) CDN -->
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

  <style>
    body {
      font-family: 'Plus Jakarta Sans', 'Noto Sans JP', sans-serif;
    }
    /* カスタムスクロールバー */
    .custom-scrollbar::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    .custom-scrollbar::-webkit-scrollbar-track {
      background: transparent;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 3px;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover {
      background: #94a3b8;
    }
    /* アニメーション */
    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.95); }
      to { opacity: 1; transform: scale(1); }
    }
    .animate-fadeIn {
      animation: fadeIn 0.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
  </style>
</head>
<body class="bg-stone-50 text-stone-800">

  <!-- Reactのマウントポイント -->
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // --- 環境変数とデータベースの自動判別 ---
    let useFirebaseRealtime = false;
    let firebaseApp = null;
    let authObj = null;
    let dbObj = null;
    let currentAppId = 'camp-link-app';

    // ローカルストレージシミュレータ用ヘルパー
    const getLocalData = (key, defaultVal) => {
      const data = localStorage.getItem(`camplink_${key}`);
      return data ? JSON.parse(data) : defaultVal;
    };

    const setLocalData = (key, val) => {
      localStorage.setItem(`camplink_${key}`, JSON.stringify(val));
    };

    // Firebaseの接続・初期化を試行
    try {
      const hasConfig = typeof __firebase_config !== 'undefined' && __firebase_config;
      if (hasConfig) {
        const firebaseConfig = JSON.parse(__firebase_config);
        firebaseApp = firebase.initializeApp(firebaseConfig);
        authObj = firebase.auth();
        dbObj = firebase.firestore();
        if (typeof __app_id !== 'undefined') {
          currentAppId = __app_id;
        }
        useFirebaseRealtime = true;
        console.log("CAMP LINK: Firebase リアルタイムクラウドモードが有効になりました。");
      } else {
        console.warn("CAMP LINK: Firebase設定が検出されませんでした。ローカルシミュレーションモードで起動します。");
      }
    } catch (e) {
      console.error("CAMP LINK: Firebase初期化エラー:", e);
    }

    // アイコンコンポーネント(SVG)の定義
    const Icons = {
      Tent: () => (
        <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 3L2 20h20L12 3z" />
          <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 3v17M12 12l5 8M12 12l-5 8" />
        </svg>
      ),
      Calendar: () => (
        <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
        </svg>
      ),
      Chat: () => (
        <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z" />
        </svg>
      ),
      User: () => (
        <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
        </svg>
      ),
      Map: () => (
        <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 011.447-.894L9 7m0 13l6-3m-6 3V7m6 10l4.553 2.276A1 1 0 0021 18.382V7.618a1 1 0 00-.553-.894L15 4m0 13V4m0 0L9 7" />
        </svg>
      ),
      Plus: () => (
        <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 6v6m0 0v6m0-6h6m-6 0H6" />
        </svg>
      ),
      Trash: () => (
        <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
        </svg>
      ),
      Info: () => (
        <svg className="w-5 h-5 text-emerald-600" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
        </svg>
      ),
      Check: () => (
        <svg className="w-5 h-5 text-emerald-600" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M5 13l4 4L19 7" />
        </svg>
      ),
      Google: () => (
        <svg className="w-5 h-5" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l2.85-2.22.81-.63z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.84c.87-2.6 3.3-4.52 6.16-4.52z" fill="#EA4335"/>
        </svg>
      )
    };

    // キャンプ区画設定
    const SITE_TYPES = [
      { id: 'trailer_and_site', name: 'トレーラハウス＋キャンプサイト', color: 'bg-teal-100 text-teal-800 border-teal-300' },
      { id: 'trailer', name: 'トレーラーハウス', color: 'bg-indigo-100 text-indigo-800 border-indigo-300' },
      { id: 'site', name: 'キャンプサイト', color: 'bg-emerald-100 text-emerald-800 border-emerald-300' },
    ];

    function App() {
      const [user, setUser] = useState(null);
      const [activeTab, setActiveTab] = useState('calendar'); // 'calendar' | 'profile' | 'chat' | 'guide'
      const [isDemo, setIsDemo] = useState(!useFirebaseRealtime);
      const [profile, setProfile] = useState({
        nickname: '',
        campStyle: 'ファミリー',
        favoriteGear: '',
        bio: '',
        avatarColor: 'bg-emerald-600',
        googleLinked: false,
        googleEmail: ''
      });
      
      const [reservations, setReservations] = useState([]);
      const [chatMessages, setChatMessages] = useState([]);
      const [currentDate, setCurrentDate] = useState(new Date());
      
      // モーダル・フォーム用
      const [isModalOpen, setIsModalOpen] = useState(false);
      const [selectedDate, setSelectedDate] = useState('');
      const [reservationForm, setReservationForm] = useState({
        id: null,
        siteType: 'site',
        nights: 1,
        guestCount: 2,
        memo: ''
      });
      
      // チャット用
      const [newMessage, setNewMessage] = useState('');
      const chatEndRef = useRef(null);
      
      // アラート＆確認ダイアログ
      const [alertMsg, setAlertMsg] = useState(null);
      const [confirmModal, setConfirmModal] = useState({
        isOpen: false,
        title: '',
        message: '',
        onConfirm: () => {},
        onCancel: () => {}
      });

      const showAlert = (message, type = 'info') => {
        setAlertMsg({ message, type });
        setTimeout(() => setAlertMsg(null), 4000);
      };

      const showConfirm = (title, message, onConfirm) => {
        setConfirmModal({
          isOpen: true,
          title,
          message,
          onConfirm: () => {
            onConfirm();
            setConfirmModal(prev => ({ ...prev, isOpen: false }));
          },
          onCancel: () => {
            setConfirmModal(prev => ({ ...prev, isOpen: false }));
          }
        });
      };

      // 1. 認証処理
      useEffect(() => {
        if (!isDemo) {
          const initAuth = async () => {
            try {
              if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                await authObj.signInWithCustomToken(__initial_auth_token);
              } else {
                await authObj.signInAnonymously();
              }
            } catch (error) {
              console.error("Auth error:", error);
              setIsDemo(true);
              showAlert("Firebase接続に失敗したため、ローカルデモモードに切り替えます。", "info");
            }
          };
          initAuth();
          
          const unsubscribe = authObj.onAuthStateChanged((currentUser) => {
            setUser(currentUser);
            if (currentUser) {
              setProfile(prev => ({
                ...prev,
                nickname: prev.nickname || `キャンパー_${currentUser.uid.substring(0, 5)}`
              }));
            }
          });
          return () => unsubscribe();
        } else {
          let localUserId = localStorage.getItem('camplink_demo_uid');
          if (!localUserId) {
            localUserId = 'demo_' + Math.random().toString(36).substring(2, 7);
            localStorage.setItem('camplink_demo_uid', localUserId);
          }
          const demoUser = { uid: localUserId, isAnonymous: true, providerData: [] };
          setUser(demoUser);
          
          // 初期のダミーデータ投入
          const defaultReservations = [
            { id: 'res_1', userId: 'other_1', userName: 'たくや', date: formatDateString(new Date()), siteType: 'trailer_and_site', nights: 1, guestCount: 4, memo: 'ファミリーで楽しみます！' },
            { id: 'res_2', userId: 'other_2', userName: 'みさと', date: formatDateString(new Date(Date.now() + 86400000)), siteType: 'site', nights: 2, guestCount: 2, memo: 'クワガタ採集が楽しみです。' }
          ];
          const defaultChats = [
            { id: 'chat_1', userId: 'other_1', userName: 'たくや', avatarColor: 'bg-blue-600', message: 'こんにちは！上野幌駅から本当に歩いてすぐですね！荷物が少なくて助かりました。', createdAt: Date.now() - 3600000 },
            { id: 'chat_2', userId: 'other_2', userName: 'みさと', avatarColor: 'bg-orange-600', message: '夜になるとコナラの木周辺でコクワガタが見つかりましたよ！', createdAt: Date.now() - 1800000 }
          ];
          
          if (!localStorage.getItem('camplink_reservations')) {
            setLocalData('reservations', defaultReservations);
          }
          if (!localStorage.getItem('camplink_chat_messages')) {
            setLocalData('chat_messages', defaultChats);
          }
        }
      }, [isDemo]);

      // 2. プロフィール同期・監視
      useEffect(() => {
        if (!user) return;
        
        if (!isDemo) {
          const profileDocRef = dbObj.collection('artifacts').doc(currentAppId).collection('users').doc(user.uid).collection('profile').doc('info');
          
          const unsubscribe = profileDocRef.onSnapshot((docSnap) => {
            const isGoogleLinked = user.providerData.some(p => p.providerId === 'google.com');
            const googleEmail = user.providerData.find(p => p.providerId === 'google.com')?.email || '';

            if (docSnap.exists) {
              setProfile({
                ...docSnap.data(),
                googleLinked: isGoogleLinked,
                googleEmail: googleEmail
              });
            } else {
              const defaultProfile = {
                nickname: user.displayName || `キャンパー_${user.uid.substring(0, 5)}`,
                campStyle: 'ソロ',
                favoriteGear: '自慢のテント',
                bio: 'キャンプ初心者です！焚き火が大好きです。',
                avatarColor: 'bg-emerald-600',
                googleLinked: isGoogleLinked,
                googleEmail: googleEmail
              };
              profileDocRef.set(defaultProfile);
              setProfile(defaultProfile);
            }
          });
          return () => unsubscribe();
        } else {
          const localProfile = getLocalData(`profile_${user.uid}`, {
            nickname: `キャンパー_${user.uid.substring(5, 10)}`,
            campStyle: 'ファミリー',
            favoriteGear: '薪割りハチェット',
            bio: '北広島クワカブキャンプ場によく来ます！大曲の大自然が大好きです。',
            avatarColor: 'bg-indigo-600',
            googleLinked: false,
            googleEmail: ''
          });
          setProfile(localProfile);
        }
      }, [user, isDemo]);

      // 3. 予約・チャット同期
      useEffect(() => {
        if (!user) return;

        if (!isDemo) {
          const resCollection = dbObj.collection('artifacts').doc(currentAppId).collection('public').doc('data').collection('reservations');
          const unsubscribeRes = resCollection.onSnapshot((snapshot) => {
            const list = [];
            snapshot.forEach((doc) => {
              list.push({ id: doc.id, ...doc.data() });
            });
            setReservations(list);
          });

          const chatCollection = dbObj.collection('artifacts').doc(currentAppId).collection('public').doc('data').collection('chat_messages');
          const unsubscribeChat = chatCollection.onSnapshot((snapshot) => {
            const list = [];
            snapshot.forEach((doc) => {
              list.push({ id: doc.id, ...doc.data() });
            });
            list.sort((a, b) => (a.createdAt || 0) - (b.createdAt || 0));
            setChatMessages(list);
          });

          return () => {
            unsubscribeRes();
            unsubscribeChat();
          };
        } else {
          const updateLocalData = () => {
            setReservations(getLocalData('reservations', []));
            setChatMessages(getLocalData('chat_messages', []));
          };
          updateLocalData();
          
          const interval = setInterval(updateLocalData, 1000);
          return () => clearInterval(interval);
        }
      }, [user, isDemo]);

      const handleGoogleLink = async () => {
        if (isDemo) {
          showAlert("デモモードではGoogle連携をシミュレートします。本物のFirebase設定を追加すると実際の認証連携が行えます。", "info");
          setProfile(prev => ({
            ...prev,
            googleLinked: true,
            googleEmail: 'camper.pro@google.com',
            nickname: 'クワカブハンター星野'
          }));
          return;
        }

        const provider = new firebase.auth.GoogleAuthProvider();
        try {
          if (user.isAnonymous) {
            const result = await user.linkWithPopup(provider);
            showAlert("Googleアカウントと安全に連携しました！予約はすべて引き継がれます。", "success");

            const googleName = result.user.displayName || '';
            const updatedProfile = {
              ...profile,
              nickname: profile.nickname.startsWith('キャンパー_') && googleName ? googleName : profile.nickname,
              googleLinked: true,
              googleEmail: result.user.email || ''
            };
            await dbObj.collection('artifacts').doc(currentAppId).collection('users').doc(user.uid).collection('profile').doc('info').set(updatedProfile);
          } else {
            await authObj.signInWithPopup(provider);
            showAlert("Googleアカウントでログインしました。", "success");
          }
        } catch (error) {
          console.error("Google Link Error:", error);
          if (error.code === 'auth/credential-already-in-use') {
            showConfirm(
              "アカウントの切り替え",
              "このGoogleアカウントは既に登録されています。データが保存されている既存アカウントに切り替えますか？（現在の未保存データは失われる場合があります）",
              async () => {
                try {
                  await authObj.signInWithPopup(provider);
                  showAlert("既存のアカウントでログインしました。", "success");
                } catch (err) {
                  showAlert("ログインの切り替えに失敗しました。", "error");
                }
              }
            );
          } else {
            showAlert(`連携に失敗しました: ${error.message}`, "error");
          }
        }
      };

      const handleSignOut = () => {
        showConfirm(
          "ログアウト確認",
          "アカウントからログアウトし、一時ゲストに戻りますか？",
          async () => {
            if (isDemo) {
              setProfile(prev => ({ ...prev, googleLinked: false, googleEmail: '' }));
              showAlert("ログアウトしました。", "info");
              return;
            }
            try {
              await authObj.signOut();
              await authObj.signInAnonymously();
              showAlert("ログアウトし、一時ゲストに切り替えました。", "info");
            } catch (error) {
              showAlert("ログアウトに失敗しました。", "error");
            }
          }
        );
      };

      const handleUpdateProfile = (e) => {
        e.preventDefault();
        if (isDemo) {
          setLocalData(`profile_${user.uid}`, profile);
          showAlert("プロフィールをローカルに保存しました！", "success");
        } else {
          dbObj.collection('artifacts').doc(currentAppId).collection('users').doc(user.uid).collection('profile').doc('info').set(profile)
            .then(() => showAlert("プロフィールをクラウドに同期しました！", "success"))
            .catch(() => showAlert("プロフィールの更新に失敗しました。", "error"));
        }
      };

      const handleSendMessage = (e) => {
        e.preventDefault();
        if (!newMessage.trim()) return;

        const chatPayload = {
          userId: user.uid,
          userName: profile.nickname || '名無しキャンパー',
          avatarColor: profile.avatarColor || 'bg-emerald-600',
          message: newMessage,
          createdAt: Date.now()
        };

        if (isDemo) {
          const currentChats = getLocalData('chat_messages', []);
          chatPayload.id = 'chat_' + Date.now();
          setLocalData('chat_messages', [...currentChats, chatPayload]);
          setNewMessage('');
        } else {
          dbObj.collection('artifacts').doc(currentAppId).collection('public').doc('data').collection('chat_messages').add(chatPayload)
            .then(() => setNewMessage(''))
            .catch(() => showAlert("チャット送信に失敗しました。", "error"));
        }
      };

      const handleSaveReservation = (e) => {
        e.preventDefault();

        const isConflict = reservations.some(res => 
          res.date === selectedDate && 
          res.siteType === reservationForm.siteType && 
          res.id !== reservationForm.id
        );

        if (isConflict) {
          showAlert("その日付の指定された区画は、すでに他の予約が入っています。", "error");
          return;
        }

        const reservationPayload = {
          userId: user.uid,
          userName: profile.nickname || '名無しキャンパー',
          date: selectedDate,
          siteType: reservationForm.siteType,
          nights: Number(reservationForm.nights),
          guestCount: Number(reservationForm.guestCount),
          memo: reservationForm.memo
        };

        if (isDemo) {
          const currentRes = getLocalData('reservations', []);
          if (reservationForm.id) {
            const updated = currentRes.map(r => r.id === reservationForm.id ? { ...r, ...reservationPayload } : r);
            setLocalData('reservations', updated);
            showAlert("予約を変更しました！", "success");
          } else {
            reservationPayload.id = 'res_' + Date.now();
            setLocalData('reservations', [...currentRes, reservationPayload]);
            showAlert("予約を登録しました！", "success");
          }
          setIsModalOpen(false);
        } else {
          const targetCol = dbObj.collection('artifacts').doc(currentAppId).collection('public').doc('data').collection('reservations');
          if (reservationForm.id) {
            targetCol.doc(reservationForm.id).update(reservationPayload)
              .then(() => { showAlert("予約を変更しました！", "success"); setIsModalOpen(false); })
              .catch(() => showAlert("予約の変更に失敗しました。", "error"));
          } else {
            reservationPayload.createdAt = Date.now();
            targetCol.add(reservationPayload)
              .then(() => { showAlert("予約を登録しました！", "success"); setIsModalOpen(false); })
              .catch(() => showAlert("予約の登録に失敗しました。", "error"));
          }
        }
      };

      const handleDeleteReservation = (resId) => {
        showConfirm(
          "予約のキャンセル",
          "本当にこのキャンプ予約をキャンセル（削除）しますか？この操作は取り消せません。",
          () => {
            if (isDemo) {
              const currentRes = getLocalData('reservations', []);
              setLocalData('reservations', currentRes.filter(r => r.id !== resId));
              showAlert("予約をキャンセルしました。", "success");
              setIsModalOpen(false);
            } else {

        const daysArray = [];
        for (let i = 0; i < firstDayIndex; i++) {

        for (let i = 1; i <= days; i++) {

        return `${y}-${m}-${d}`;

                    <p className="flex items-center gap-2">
                      <span className="font-bold text-emerald-800">🚇 交通アクセス:</span>
                      <span>JR北海道千歳線「上野幌」駅より 徒歩10分</span>
                    </p>
                  </div>

                  <p className="text-stone-600 text-sm leading-relaxed mb-6">
                    「北広島クワカブキャンプ場」は、札幌に隣接する北広島市大曲の豊かな雑木林に位置するプライベートキャンプ場です。
                    駅近徒歩10分という抜群のアクセス性を誇りながらも、一歩足を踏み入れれば、そこは都会の喧騒を忘れさせる静寂の森。
                    クワガタやカブトムシなどの甲虫類が生息する豊かなコナラやクヌギの木々に囲まれており、夏には昆虫採集や自然観察のメッカとして、ファミリーから本格ソロキャンパーまで幅広く愛されています。
                  </p>

                  <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <div className="border border-teal-100 bg-teal-50/20 p-5 rounded-xl">
                      <h3 className="font-bold text-teal-900 mb-2 flex items-center gap-1.5">
                        <span className="w-2 h-2 rounded-full bg-teal-600"></span>
                        トレーラハウス＋キャンプサイト
                      </h3>
                      <p className="text-xs text-stone-600 leading-relaxed">
                        快適な空調を備えたトレーラーハウスと、広々とした芝生エリアが融合。上野幌駅からバックパック一つで訪れても、最高のグラマラス・アウトドアをご堪能いただけます。
                      </p>
                    </div>

                    <div className="border border-indigo-100 bg-indigo-50/20 p-5 rounded-xl">
                      <h3 className="font-bold text-indigo-900 mb-2 flex items-center gap-1.5">
                        <span className="w-2 h-2 rounded-full bg-indigo-600"></span>
                        トレーラーハウス
                      </h3>
                      <p className="text-xs text-stone-600 leading-relaxed">
                        雨や北海道の涼しい夜でも安心の、暖房・設備完備のアメリカンコテージ仕様。手ぶらでキャンプ気分を味わいたい方や、快適なワーケーションにも最適です。
                      </p>
                    </div>

                    <div className="border border-emerald-100 bg-emerald-50/20 p-5 rounded-xl">
                      <h3 className="font-bold text-emerald-900 mb-2 flex items-center gap-1.5">
                        <span className="w-2 h-2 rounded-full bg-emerald-600"></span>
                        キャンプサイト
                      </h3>
                      <p className="text-xs text-stone-600 leading-relaxed">
                        木漏れ日が心地よく降り注ぐ芝生のフリーサイト。夜には美しい星空を眺め、夏には木々を巡ってクワガタ・カブトムシ探しを楽しめます。
                      </p>
                    </div>
                  </div>

                  {/* 利用ルール */}
                  <div className="mt-8 border-t border-stone-100 pt-6">
                    <h3 className="font-bold text-stone-800 mb-3 text-base">安心してお過ごしいただくためのルール</h3>
                    <ul className="space-y-2 text-xs text-stone-600">
                      <li className="flex items-start gap-2">
                        <span className="text-emerald-700">✔</span>
                        <strong>クワイエットタイム:</strong> 22:00〜翌朝7:00までは静かにお過ごしください。音楽や大きな声での会話はお控えください。
                      </li>
                      <li className="flex items-start gap-2">
                        <span className="text-emerald-700">✔</span>
                        <strong>クワカブ（昆虫保護）:</strong> 樹木を傷つけるような採集（トラップの放置、木の皮剥ぎなど）は固く禁止しております。自然を愛する優しさを持って観察しましょう。
                      </li>
                      <li className="flex items-start gap-2">
                        <span className="text-emerald-700">✔</span>
                        <strong>直火の禁止:</strong> 地面での直接の焚き火は禁止です。必ず焚き火台とスパッタシート（焚き火シート）をご使用ください。
                      </li>
                    </ul>
                  </div>
                </div>
              </div>
            )}
          </main>

          {/* 予約作成・編集ダイアログモーダル */}
          {isModalOpen && (
            <div className="fixed inset-0 z-50 bg-stone-900/60 flex items-center justify-center p-4 backdrop-blur-sm">
              <div className="bg-white rounded-2xl w-full max-w-md overflow-hidden shadow-xl border border-stone-100 animate-fadeIn">
                {/* モーダルヘッダー */}
                <div className="bg-emerald-900 text-white p-4 flex justify-between items-center">
                  <div>
                    <h3 className="font-bold text-base">
                      {reservationForm.id ? "予約内容の確認・変更" : "キャンプ宿泊予約の登録"}
                    </h3>
                    <p className="text-xs text-emerald-200 mt-0.5">予約日: {selectedDate}</p>
                  </div>
                  <button 
                    onClick={() => setIsModalOpen(false)}
                    className="text-emerald-200 hover:text-white font-bold p-1 rounded-lg hover:bg-emerald-800 transition"
                  >
                    ✕
                  </button>
                </div>

                {/* モーダルコンテンツ */}
                <form onSubmit={handleSaveReservation} className="p-5 space-y-4 text-sm">
                  
                  {/* 区画選択 */}
                  <div>
                    <label className="block font-semibold text-stone-700 mb-1">キャンプ区画</label>
                    <select
                      value={reservationForm.siteType}
                      onChange={(e) => setReservationForm({ ...reservationForm, siteType: e.target.value })}
                      className="w-full px-3 py-2 border border-stone-200 rounded-lg focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none transition bg-white"
                    >
                      {SITE_TYPES.map(site => (
                        <option key={site.id} value={site.id}>
                          {site.name}
                        </option>
                      ))}
                    </select>
                  </div>

                  {/* 宿泊日数 & 人数 */}
                  <div className="grid grid-cols-2 gap-4">
                    <div>
                      <label className="block font-semibold text-stone-700 mb-1">宿泊日数</label>
                      <select
                        value={reservationForm.nights}
                        onChange={(e) => setReservationForm({ ...reservationForm, nights: Number(e.target.value) })}
                        className="w-full px-3 py-2 border border-stone-200 rounded-lg focus:ring-2 focus:ring-emerald-500 bg-white"
                      >
                        {[1, 2, 3, 4, 5].map(n => (
                          <option key={n} value={n}>{n} 泊</option>
                        ))}
                      </select>
                    </div>
                    <div>
                      <label className="block font-semibold text-stone-700 mb-1">ご利用人数</label>
                      <select
                        value={reservationForm.guestCount}
                        onChange={(e) => setReservationForm({ ...reservationForm, guestCount: Number(e.target.value) })}
                        className="w-full px-3 py-2 border border-stone-200 rounded-lg focus:ring-2 focus:ring-emerald-500 bg-white"
                      >
                        {[1, 2, 3, 4, 5, 6, 7, 8].map(g => (
                          <option key={g} value={g}>{g} 名</option>
                        ))}
                      </select>
                    </div>
                  </div>

                  {/* ご要望・メモ */}
                  <div>
                    <label className="block font-semibold text-stone-700 mb-1">ご要望・持ち込みテントなど (任意)</label>
                    <textarea
                      value={reservationForm.memo}
                      onChange={(e) => setReservationForm({ ...reservationForm, memo: e.target.value })}
                      placeholder="大型ツールームテントを持ち込みます。ファミリーキャンプです。"
                      rows="3"
                      className="w-full px-3 py-2 border border-stone-200 rounded-lg focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none transition resize-none"
                    />
                  </div>

                  {/* アクションボタン */}
                  <div className="pt-2 flex gap-2 justify-end">
                    {reservationForm.id && (
                      <button
                        type="button"
                        onClick={() => handleDeleteReservation(reservationForm.id)}
                        className="flex items-center gap-1.5 px-4 py-2 border border-red-200 bg-red-50 text-red-700 hover:bg-red-100 rounded-lg font-bold transition mr-auto"
                      >
                        <Icons.Trash />
                        <span>キャンセル</span>
                      </button>
                    )}

                    <button
                      type="button"
                      onClick={() => setIsModalOpen(false)}
                      className="px-4 py-2 bg-stone-100 hover:bg-stone-200 text-stone-700 rounded-lg font-bold transition"
                    >
                      閉じる
                    </button>
                    
                    <button
                      type="submit"
                      className="px-5 py-2 bg-emerald-800 hover:bg-emerald-700 text-white rounded-lg font-bold transition flex items-center gap-1.5"
                    >
                      <span>{reservationForm.id ? "変更を保存" : "予約する"}</span>
                    </button>
                  </div>

                </form>
              </div>
            </div>
          )}

          {/* フッター */}
          <footer className="bg-stone-800 text-stone-400 text-center py-6 border-t border-stone-700 text-xs mt-auto">
            <p>© 2026 CAMP LINK Co., Ltd. All Rights Reserved.</p>
            <p className="mt-1 text-stone-500">Firebase & React を利用したリアルタイム同期 / ローカルシミュレーション</p>
          </footer>
        </div>
      );
    }

    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(<App />);
  </script>
</body>
</html>
</html>
