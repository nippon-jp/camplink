    const getDaysInMonth = (date) => {
      const y = date.getFullYear(), m = date.getMonth();
      const total = new Date(y, m + 1, 0).getDate();
      const first = new Date(y, m, 1).getDay();
      const arr = [];
      for (let i = 0; i < first; i++) arr.push(null);
      for (let i = 1; i <= total; i++) arr.push(new Date(y, m, i));
      return arr;
    };
    const getDaysInWeek = (date) => {
      const c = new Date(date), s = new Date(c); s.setDate(c.getDate() - c.getDay());
      return Array.from({ length: 7 }, (_, i) => { const d = new Date(s); d.setDate(s.getDate() + i); return d; });
    };
    const fmt = (date) => {
      if (!date) return '';
      const y = date.getFullYear(), m = String(date.getMonth() + 1).padStart(2,'0'), d = String(date.getDate()).padStart(2,'0');
      return `${y}-${m}-${d}`;
    };
    const relTime = (ts) => {
      if (!ts) return '';
      const diff = Date.now() - ts;
      const min = Math.floor(diff / 60000);
      if (min < 1) return 'たった今';
      if (min < 60) return `${min}分前`;
      const h = Math.floor(min / 60);
      if (h < 24) return `${h}時間前`;
      const d = Math.floor(h / 24);
      if (d < 7) return `${d}日前`;
      return new Date(ts).toLocaleDateString('ja-JP', { month:'long', day:'numeric' });
    };

      const showAlert = (message, type='info') => { setAlertMsg({ message, type }); setTimeout(() => setAlertMsg(null), 3200); };
      const showConfirm = (title, message, onConfirm, tone='pine') => {
        setConfirmModal({ isOpen:true, title, message, tone,
          onConfirm: () => { onConfirm(); setConfirmModal(p => ({ ...p, isOpen:false })); },
          onCancel: () => setConfirmModal(p => ({ ...p, isOpen:false })) });
      };

      const enterApp = () => { sessionStorage.setItem('cl_splash','1'); setShowSplash(false); };

      /* ---- demo data loader (no polling; storage event + explicit refresh) ---- */
      const loadDemo = () => {
        setReservations(getLocalData('reservations', []));
        setChatMessages(getLocalData('chat_messages', []));
        setEventsList(getLocalData('events', []));
        setAnnouncements(getLocalData('announcements', []));
        setAdminCredentials(getLocalData('admin_settings', DEFAULT_ADMIN));
      };
      const persistDemo = (key, val) => { setLocalData(key, val); loadDemo(); };

      /* ---- admin ---- */
      const handleAdminLogin = (e) => {
        e.preventDefault();
        if (adminIdInput === adminCredentials.adminId && adminPwInput === adminCredentials.adminPassword) {
          setIsAdmin(true); setShowAdminModal(false); setAdminIdInput(''); setAdminPwInput('');
          setAdminForm(adminCredentials);
          showAlert(`管理者「${adminCredentials.adminName}」でログインしました。`, 'success');
        } else { showAlert('IDまたはパスワードが違います。', 'error'); }
      };
      const handleAdminLogout = () => { setIsAdmin(false); showAlert('管理者モードを終了しました。', 'info'); };
      const handleUpdateAdmin = (e) => {
        e.preventDefault();
        if (isDemo) { persistDemo('admin_settings', adminForm); setAdminCredentials(adminForm); showAlert('管理者設定を保存しました。', 'success'); }
        else { pub().collection('admin_settings').doc('config').set(adminForm)
          .then(() => { setAdminCredentials(adminForm); showAlert('管理者設定をクラウドへ保存しました。', 'success'); })
          .catch(() => showAlert('保存に失敗しました。', 'error')); }
      };

      /* ---- auth ---- */
      useEffect(() => {
        if (!isDemo) {
          (async () => {
            try {
              if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) await authObj.signInWithCustomToken(__initial_auth_token);
              else await authObj.signInAnonymously();
            } catch (e) { setIsDemo(true); showAlert('クラウド未接続のため、おためしモードで起動します。', 'info'); }
          })();
          const unsub = authObj.onAuthStateChanged((u) => {
            setUser(u);
            if (u) setProfile(p => ({ ...p, nickname: p.nickname || `キャンパー_${u.uid.substring(0,5)}` }));
          });
          return () => unsub();
        } else {
          let id = localStorage.getItem('camplink_demo_uid');
          if (!id) { id = 'demo_' + Math.random().toString(36).substring(2,7); localStorage.setItem('camplink_demo_uid', id); }
          setUser({ uid:id, isAnonymous:true, providerData:[] });

          const today = new Date();
          const plus = (n) => fmt(new Date(Date.now() + n*86400000));
          if (!localStorage.getItem('camplink_reservations')) setLocalData('reservations', [
            { id:'res_1', userId:'other_1', userName:'たくやくん', date: plus(1), siteType:'trailer_and_site', nights:1, guestCount:4, memo:'家族みんなでカブトムシをつかまえるよ！🌳' },
            { id:'res_2', userId:'other_2', userName:'みさとちゃん', date: plus(2), siteType:'site', nights:2, guestCount:2, memo:'クワガタがたくさんいるといいな。' },
            { id:'res_3', userId:'other_3', userName:'さとうファミリー', date: plus(2), siteType:'trailer', nights:1, guestCount:3, memo:'' },
            { id:'res_4', userId:'other_1', userName:'たくやくん', date: plus(5), siteType:'site', nights:1, guestCount:2, memo:'' },
          ]);
          if (!localStorage.getItem('camplink_chat_messages')) setLocalData('chat_messages', [
            { id:'chat_1', userId:'other_1', userName:'たくやくん', avatarColor:'bg-pine-600', message:'こんにちは！駅から歩いてすぐなのが最高ですね🎒', createdAt: Date.now()-3600000 },
            { id:'chat_2', userId:'other_2', userName:'みさとちゃん', avatarColor:'bg-teal-600', message:'夜、白樺の幹の近くにクワガタが集まってました！🌲', createdAt: Date.now()-1800000 },
          ]);
          if (!localStorage.getItem('camplink_events')) setLocalData('events', [
            { id:'ev_1', creatorId:'admin_1', creatorName:'ひろきお兄さん', avatarColor:'bg-pine-700',
              title:'🦉 夜のクワガタ・カブトムシ大冒険ツアー！', date: plus(4), category:'昆虫採集',
              description:'夜20時に管理棟の前に集合！バナナトラップを仕掛けた秘密のポイントへみんなで探検に出発するよ。長袖長ズボン・ライトを持ってきてね。',
              likes:['other_1','other_2'],
              participants:[{ userId:'other_1', userName:'たくやくん', avatarColor:'bg-pine-600' },{ userId:'other_2', userName:'みさとちゃん', avatarColor:'bg-teal-600' }],
              comments:[{ id:'c_1', userId:'other_1', userName:'たくやくん', text:'すごくたのしみ！ワクワクする！', createdAt: Date.now()-7200000 }] },
          ]);
          if (!localStorage.getItem('camplink_announcements')) setLocalData('announcements', [
            { id:'an_1', title:'🌟 7月「ホタル観賞ナイト」開催のお知らせ', body:'7月の毎週末、日没後に小川沿いでホタル観賞を行います。足元が暗いので懐中電灯をご持参ください。管理棟にて受付中です。', author:'管理人 ひろきお兄さん', createdAt: Date.now()-86400000 },
            { id:'an_2', title:'🚿 シャワー棟リニューアル完了', body:'シャワー棟の改装が完了し、24時間ご利用いただけるようになりました。お湯の出も快適になっています。', author:'管理人 ひろきお兄さん', createdAt: Date.now()-3*86400000 },
          ]);
          loadDemo();
          window.addEventListener('storage', loadDemo);
          return () => window.removeEventListener('storage', loadDemo);
        }
      }, [isDemo]);

      /* ---- profile sync ---- */
      useEffect(() => {
        if (!user) return;
        if (!isDemo) {
          const ref = dbObj.collection('artifacts').doc(currentAppId).collection('users').doc(user.uid).collection('profile').doc('info');
          const unsub = ref.onSnapshot((snap) => {
            const linked = user.providerData.some(p => p.providerId === 'google.com');
            const email = user.providerData.find(p => p.providerId === 'google.com')?.email || '';
            if (snap.exists) setProfile({ ...snap.data(), googleLinked:linked, googleEmail:email });
            else { const d = { nickname:user.displayName || `キャンパー_${user.uid.substring(0,5)}`, campStyle:'ファミリー（みんなで）', favoriteGear:'むしとりあみ・虫かご', bio:'北広島の豊かな自然でたくさん遊びたいです！🌳', avatarColor:'bg-pine-600', googleLinked:linked, googleEmail:email }; ref.set(d); setProfile(d); }
          });
          return () => unsub();
        } else {
          setProfile(getLocalData(`profile_${user.uid}`, { nickname:`キャンパー_${user.uid.substring(2,6)}`, campStyle:'ファミリー（みんなで）', favoriteGear:'むしとりあみ・虫かご', bio:'北広島大曲の大自然でたくさん遊びたいです！🌳', avatarColor:'bg-pine-600', googleLinked:false, googleEmail:'' }));
        }
      }, [user, isDemo]);

      /* ---- realtime collections (firebase) ---- */
      useEffect(() => {
        if (!user || isDemo) return;
        const unsubs = [];
        unsubs.push(pub().collection('reservations').onSnapshot(s => { const l=[]; s.forEach(d => l.push({ id:d.id, ...d.data() })); setReservations(l); }));
        unsubs.push(pub().collection('chat_messages').onSnapshot(s => { const l=[]; s.forEach(d => l.push({ id:d.id, ...d.data() })); l.sort((a,b)=>(a.createdAt||0)-(b.createdAt||0)); setChatMessages(l); }));
        unsubs.push(pub().collection('events').onSnapshot(s => { const l=[]; s.forEach(d => l.push({ id:d.id, ...d.data() })); l.sort((a,b)=>b.id.localeCompare(a.id)); setEventsList(l); }));
        unsubs.push(pub().collection('announcements').onSnapshot(s => { const l=[]; s.forEach(d => l.push({ id:d.id, ...d.data() })); l.sort((a,b)=>(b.createdAt||0)-(a.createdAt||0)); setAnnouncements(l); }));
        unsubs.push(pub().collection('admin_settings').doc('config').onSnapshot(d => { if (d.exists) setAdminCredentials(d.data()); else { pub().collection('admin_settings').doc('config').set(DEFAULT_ADMIN); setAdminCredentials(DEFAULT_ADMIN); } }));
        return () => unsubs.forEach(u => u());
      }, [user, isDemo]);

      /* ---- chat autoscroll (no scrollIntoView) ---- */
      useEffect(() => {
        if (activeTab === 'chat' && chatScrollRef.current) {
          const el = chatScrollRef.current; el.scrollTop = el.scrollHeight;
        }
      }, [chatMessages, activeTab]);

      /* ---- google / signout / profile ---- */
      const handleGoogleLink = async () => {
        if (isDemo) { setProfile(p => ({ ...p, googleLinked:true, googleEmail:'demo.camper@gmail.com', nickname:'クワカブマスター星野' })); showAlert('おためしモードでは、デモ連携として完了します。', 'info'); return; }
        const provider = new firebase.auth.GoogleAuthProvider();
        try {
          if (user.isAnonymous) {
            const r = await user.linkWithPopup(provider);
            const gName = r.user.displayName || '';
            const up = { ...profile, nickname: profile.nickname.startsWith('キャンパー_') && gName ? gName : profile.nickname, googleLinked:true, googleEmail:r.user.email || '' };
            await dbObj.collection('artifacts').doc(currentAppId).collection('users').doc(user.uid).collection('profile').doc('info').set(up);
            showAlert('Googleアカウントと連携しました！', 'success');
          } else { await authObj.signInWithPopup(provider); showAlert('Googleでサインインしました。', 'success'); }
        } catch (e) { showAlert('アカウント連携に失敗しました。', 'error'); }
      };
      const handleSignOut = () => showConfirm('サインアウトしますか？', 'ログアウトして初期のゲストアカウントに戻ります。', async () => {
        if (isDemo) { setProfile(p => ({ ...p, googleLinked:false, googleEmail:'' })); showAlert('サインアウトしました。', 'info'); return; }
        try { await authObj.signOut(); await authObj.signInAnonymously(); showAlert('新しいゲスト用IDを発行しました。', 'info'); } catch (e) { showAlert('サインアウトに失敗しました。', 'error'); }
      });
      const handleUpdateProfile = (e) => {
        e.preventDefault();
        if (isDemo) { setLocalData(`profile_${user.uid}`, profile); showAlert('プロフィールを保存しました。', 'success'); }
        else dbObj.collection('artifacts').doc(currentAppId).collection('users').doc(user.uid).collection('profile').doc('info').set(profile)
          .then(() => showAlert('プロフィールをクラウドへ同期しました！', 'success')).catch(() => showAlert('保存できませんでした。', 'error'));
      };

      /* ---- chat ---- */
      const handleSendMessage = (e) => {
        e.preventDefault();
        if (!newMessage.trim()) return;
        const payload = { userId:user.uid, userName:profile.nickname || 'キャンパー', avatarColor:profile.avatarColor || 'bg-pine-600', message:newMessage, createdAt:Date.now() };
        if (isDemo) { payload.id = 'chat_' + Date.now(); persistDemo('chat_messages', [...getLocalData('chat_messages', []), payload]); setNewMessage(''); }
        else pub().collection('chat_messages').add(payload).then(() => setNewMessage('')).catch(() => showAlert('送信に失敗しました。', 'error'));
      };
      const handleDeleteChat = (id) => showConfirm('メッセージを削除しますか？', 'このチャットメッセージを削除します。', () => {
        if (isDemo) persistDemo('chat_messages', getLocalData('chat_messages', []).filter(c => c.id !== id));
        else pub().collection('chat_messages').doc(id).delete();
        showAlert('メッセージを削除しました。', 'success');
      }, 'ember');

      /* ---- reservations ---- */
      const handleSaveReservation = (e) => {
        e.preventDefault();
        const conflict = reservations.some(r => r.date === selectedDate && r.siteType === resForm.siteType && r.id !== resForm.id);
        if (conflict) { showAlert('そのエリアはこの日すでに予約済みです。別のエリア・日程をお選びください。', 'error'); return; }
        const target = resForm.id ? reservations.find(r => r.id === resForm.id) : null;
        const payload = { userId: target ? target.userId : user.uid, userName: target ? target.userName : (profile.nickname || 'ゲストキャンパー'), date:selectedDate, siteType:resForm.siteType, nights:Number(resForm.nights), guestCount:Number(resForm.guestCount), memo:resForm.memo };
        if (isDemo) {
          const cur = getLocalData('reservations', []);
          if (resForm.id) { persistDemo('reservations', cur.map(r => r.id === resForm.id ? { ...r, ...payload } : r)); showAlert('予約内容を変更しました！', 'success'); }
          else { payload.id = 'res_' + Date.now(); persistDemo('reservations', [...cur, payload]); showAlert('宿泊予約を確定しました！ 🎉', 'success'); }
          setIsModalOpen(false);
        } else {
          const col = pub().collection('reservations');
          if (resForm.id) col.doc(resForm.id).update(payload).then(() => { showAlert('予約内容を変更しました！', 'success'); setIsModalOpen(false); }).catch(() => showAlert('予約の更新に失敗しました。', 'error'));
          else { payload.createdAt = Date.now(); col.add(payload).then(() => { showAlert('宿泊予約を登録しました！ 🎉', 'success'); setIsModalOpen(false); }).catch(() => showAlert('予約登録に失敗しました。', 'error')); }
        }
      };
      const handleDeleteReservation = (id) => showConfirm('予約を取り消しますか？', 'この操作は元に戻せません。本当に予約をキャンセルしますか？', () => {
        if (isDemo) persistDemo('reservations', getLocalData('reservations', []).filter(r => r.id !== id));
        else pub().collection('reservations').doc(id).delete();
        showAlert('予約を取り消しました。', 'success'); setIsModalOpen(false);
      }, 'ember');

      /* ---- events ---- */
      const handleCreateEvent = (e) => {
        e.preventDefault();
        if (!eventForm.title || !eventForm.date || !eventForm.description) return;
        const payload = { id:'ev_'+Date.now(), creatorId:user.uid,
          creatorName: isAdmin ? adminCredentials.adminName : (profile.nickname || 'キャンパー'),
          avatarColor: isAdmin ? adminCredentials.adminAvatarColor : (profile.avatarColor || 'bg-pine-600'),
          title:eventForm.title, date:eventForm.date, category:eventForm.category, description:eventForm.description, likes:[], participants:[], comments:[] };
        if (isDemo) persistDemo('events', [payload, ...getLocalData('events', [])]);
        else pub().collection('events').doc(payload.id).set(payload).catch(() => showAlert('作成に失敗しました。', 'error'));
        showAlert('イベントを投稿しました！📣', 'success'); setShowEventCreate(false); setEventForm({ title:'', date:'', category:'昆虫採集', description:'' });
      };
      const updateEvent = (id, mut) => {
        const updated = eventsList.map(ev => ev.id === id ? mut(ev) : ev);
        if (isDemo) persistDemo('events', updated);
        else { const t = updated.find(ev => ev.id === id); pub().collection('events').doc(id).update({ likes:t.likes, participants:t.participants, comments:t.comments }); }
      };
      const handleToggleLike = (id) => updateEvent(id, ev => { const liked = ev.likes?.includes(user?.uid); return { ...ev, likes: liked ? ev.likes.filter(u => u !== user.uid) : [...(ev.likes||[]), user.uid] }; });
      const handleToggleParticipant = (id) => { updateEvent(id, ev => { const p = ev.participants?.some(x => x.userId === user.uid); return { ...ev, participants: p ? ev.participants.filter(x => x.userId !== user.uid) : [...(ev.participants||[]), { userId:user.uid, userName:profile.nickname || 'キャンパー', avatarColor:profile.avatarColor || 'bg-pine-600' }] }; }); showAlert('参加状態を更新しました。', 'success'); };
      const handleAddComment = (id) => {
        const text = eventComments[id];
        if (!text || !text.trim()) return;
        const c = { id:'c_'+Date.now(), userId:user.uid, userName:profile.nickname || 'キャンパー', text, createdAt:Date.now() };
        updateEvent(id, ev => ({ ...ev, comments:[...(ev.comments||[]), c] }));
        setEventComments(p => ({ ...p, [id]:'' }));
      };
      const handleDeleteEvent = (id) => showConfirm('イベントを削除しますか？', 'このイベント掲載を取り下げます。', () => {
        if (isDemo) persistDemo('events', getLocalData('events', []).filter(ev => ev.id !== id));
        else pub().collection('events').doc(id).delete();
        showAlert('イベントを削除しました。', 'success');
      }, 'ember');

      /* ---- announcements ---- */
      const handlePostAnnouncement = (e) => {
        e.preventDefault();
        if (!annForm.title.trim() || !annForm.body.trim()) return;
        const payload = { id:'an_'+Date.now(), title:annForm.title, body:annForm.body, author:adminCredentials.adminName, createdAt:Date.now() };
        if (isDemo) persistDemo('announcements', [payload, ...getLocalData('announcements', [])]);
        else pub().collection('announcements').doc(payload.id).set(payload).catch(() => showAlert('投稿に失敗しました。', 'error'));
        setAnnForm({ title:'', body:'' }); showAlert('お知らせを投稿しました。📣', 'success');
      };
      const handleDeleteAnnouncement = (id) => showConfirm('お知らせを削除しますか？', 'このお知らせを取り下げます。', () => {
        if (isDemo) persistDemo('announcements', getLocalData('announcements', []).filter(a => a.id !== id));
        else pub().collection('announcements').doc(id).delete();
        showAlert('お知らせを削除しました。', 'success');
      }, 'ember');

      const sortedAnnouncements = useMemo(() => [...announcements].sort((a,b)=>(b.createdAt||0)-(a.createdAt||0)), [announcements]);
      const unreadCount = useMemo(() => sortedAnnouncements.filter(a => (a.createdAt||0) > lastReadAnn).length, [sortedAnnouncements, lastReadAnn]);
      const openNotif = () => { setShowNotif(true); const now = Date.now(); localStorage.setItem('camplink_ann_read', String(now)); setLastReadAnn(now); };

      /* ---- calendar navigation ---- */
      const changeMonth = (o) => setCurrentDate(new Date(currentDate.getFullYear(), currentDate.getMonth() + o, 1));
      const changeWeek = (o) => { const n = new Date(currentDate); n.setDate(currentDate.getDate() + o*7); setCurrentDate(n); };
      const handleDateClick = (date) => {
        if (!date) return;
        const f = fmt(date); setSelectedDate(f);
        const existing = reservations.find(r => r.date === f && (r.userId === user?.uid || isAdmin));
        if (existing) setResForm({ id:existing.id, siteType:existing.siteType, nights:existing.nights, guestCount:existing.guestCount, memo:existing.memo || '' });
        else { const taken = new Set(reservations.filter(r => r.date === f).map(r => r.siteType)); const firstFree = SITE_TYPES.find(s => !taken.has(s.id)) || SITE_TYPES[2]; setResForm({ id:null, siteType:firstFree.id, nights:1, guestCount:2, memo:'' }); }
        setIsModalOpen(true);
      };

      const days = useMemo(() => getDaysInMonth(currentDate), [currentDate]);
      const weekDays = useMemo(() => getDaysInWeek(currentDate), [currentDate]);
      const reservedMap = useMemo(() => { const m = {}; reservations.forEach(r => { (m[r.date] = m[r.date] || new Set()).add(r.siteType); }); return m; }, [reservations]);
      const myReservations = useMemo(() => reservations.filter(r => r.userId === user?.uid).length, [reservations, user]);

      const tabs = [
        { id:'calendar', label:'予約', Icon:Icons.Calendar },
        { id:'events',   label:'コミュニティ', Icon:Icons.Community },
        { id:'chat',     label:'たきび', Icon:Icons.Fire },
        { id:'profile',  label:'設定', Icon:Icons.User },
        { id:'guide',    label:'ガイド', Icon:Icons.Map },
      ];

      const Avatar = ({ color, name, size='w-11 h-11', text='text-base' }) => (
        <div className={`${size} rounded-2xl ${color || 'bg-pine-600'} flex items-center justify-center text-white font-bold ${text} shadow-soft shrink-0`}>
          {(name || 'C').charAt(0).toUpperCase()}
        </div>
      );

      return (
        <div className="min-h-[100dvh] bg-paper text-bark-900 flex flex-col selection:bg-pine-200">

          {/* ================= Splash ================= */}
          {showSplash && (
            <div className="fixed inset-0 z-[100] bg-canvas flex flex-col items-center justify-center px-8 text-center anim-fade">
              <div className="absolute inset-0 bg-[radial-gradient(circle_at_50%_38%,rgba(60,117,86,0.10)_0%,rgba(0,0,0,0)_62%)] pointer-events-none"></div>
              <div className="anim-float mb-10">
                <div className="w-36 h-36 sm:w-44 sm:h-44 bg-white rounded-[2.2rem] border border-bark-200 shadow-lift flex items-center justify-center p-7 text-pine-700">
                  <Icons.Logo className="w-full h-full" />
                </div>
              </div>
              <div className="space-y-4 z-10 max-w-md">
                <h1 className="font-display text-5xl sm:text-6xl font-bold text-pine-800 tracking-tight">CAMP LINK</h1>
                <p className="text-pine-600 font-bold tracking-widest text-sm">北広島クワカブキャンプ場</p>
                <div className="h-px w-14 bg-bark-300 mx-auto"></div>
                <p className="text-bark-500 font-medium leading-relaxed text-sm max-w-xs mx-auto">白樺の木々と触れ合い、仲間とつながる<br/>スマートな予約コミュニティ</p>
              </div>
              <button onClick={enterApp} className="mt-12 px-12 py-4 bg-pine-700 hover:bg-pine-600 active:scale-95 text-white font-bold text-lg rounded-full shadow-lift transition-all">
                入場する
              </button>
            </div>
          )}

          {/* ================= Toast ================= */}
          {alertMsg && (
            <div className="fixed top-4 inset-x-4 sm:left-auto sm:right-6 sm:w-auto sm:max-w-md z-[90] anim-fade">
              <div className={`flex items-center gap-3 p-4 rounded-2xl shadow-lift border bg-white ${alertMsg.type==='error' ? 'border-ember-200' : 'border-bark-200'}`}>
                <div className={`w-10 h-10 rounded-xl flex items-center justify-center shrink-0 ${alertMsg.type==='success' ? 'bg-pine-50 text-pine-600' : alertMsg.type==='error' ? 'bg-ember-50 text-ember-500' : 'bg-bark-100 text-bark-500'}`}>
                  {alertMsg.type==='success' ? <Icons.Check className="w-6 h-6" /> : <Icons.Info className="w-6 h-6" />}
                </div>
                <p className="text-bark-800 font-bold leading-snug text-sm">{alertMsg.message}</p>
              </div>
            </div>
          )}

          {/* ================= Confirm ================= */}
          {confirmModal.isOpen && (
            <div className="fixed inset-0 z-[80] bg-bark-900/40 backdrop-blur-sm flex items-end sm:items-center justify-center p-0 sm:p-6">
              <div className="bg-white w-full sm:max-w-md rounded-t-4xl sm:rounded-4xl overflow-hidden shadow-lift anim-sheet">
                <div className="p-7 sm:p-8 space-y-6">
                  <h3 className="font-display font-bold text-2xl text-bark-900">{confirmModal.title}</h3>
                  <p className="text-bark-600 font-medium leading-relaxed">{confirmModal.message}</p>
                  <div className="flex gap-3 pt-1">
                    <button onClick={confirmModal.onCancel} className="flex-1 py-3.5 bg-bark-100 hover:bg-bark-200 text-bark-700 font-bold rounded-2xl transition">もどる</button>

                        <h3 className="font-display font-bold text-xl text-bark-900 leading-snug">{ev.title}</h3>
                        <div className="inline-flex items-center gap-2 bg-canvas border border-bark-200 rounded-xl px-3 py-1.5 text-sm font-bold text-bark-600"><Icons.Calendar className="w-4 h-4 text-pine-600" />{ev.date}</div>
                        <p className="text-bark-600 font-medium leading-relaxed whitespace-pre-wrap">{ev.description}</p>
                      </div>
                      <div className="px-5 py-3.5 bg-canvas border-y border-bark-100 flex items-center justify-between gap-3">
                        <span className="text-sm font-bold text-bark-500">参加 <span className="text-bark-900">{ev.participants?.length || 0}</span> 名</span>
                        <div className="flex items-center gap-2">
                          <button onClick={() => handleToggleLike(ev.id)} className={`flex items-center gap-1.5 px-3.5 py-2 rounded-xl border text-sm font-bold transition ${liked ? 'bg-ember-50 border-ember-200 text-ember-500' : 'bg-white border-bark-200 text-bark-500'}`}><Icons.Heart filled={liked} className="w-4 h-4" />{ev.likes?.length || 0}</button>
                          <button onClick={() => handleToggleParticipant(ev.id)} className={`px-4 py-2 rounded-xl text-sm font-bold transition ${joined ? 'bg-pine-700 text-white' : 'bg-white border border-pine-600 text-pine-700'}`}>{joined ? '✓ 参加予定' : '参加希望'}</button>
                        </div>
                      </div>
                      <div className="p-5 space-y-3">
                        {(ev.comments || []).map(c => (
                          <div key={c.id} className="bg-canvas border border-bark-100 rounded-2xl p-3.5">
                            <div className="flex items-center justify-between mb-1"><span className="text-sm font-bold text-pine-700">{c.userName}</span><span className="text-[10px] font-bold text-bark-400">{relTime(c.createdAt)}</span></div>
                            <p className="text-sm text-bark-600 font-medium whitespace-pre-wrap">{c.text}</p>
                          </div>
                        ))}
                        <div className="flex gap-2">
                          <input type="text" placeholder="質問やメッセージを…" value={eventComments[ev.id] || ''} onChange={e => setEventComments({ ...eventComments, [ev.id]:e.target.value })} className={inputCls} />
                          <button onClick={() => handleAddComment(ev.id)} className="shrink-0 px-5 bg-bark-800 hover:bg-bark-900 text-white font-bold rounded-2xl transition">送信</button>
                        </div>
                      </div>
                    </div>
                  );
                })}
              </div>
            )}

            {/* ---------------- CHAT ---------------- */}
            {activeTab === 'chat' && (
              <div className="bg-white border border-bark-200 rounded-4xl shadow-soft flex flex-col h-[calc(100dvh-13.5rem)] min-h-[420px] overflow-hidden anim-fade">
                <div className="px-5 py-4 border-b border-bark-100 flex items-center justify-between gap-3 shrink-0">
                  <div className="flex items-center gap-2.5"><div className="w-10 h-10 rounded-2xl bg-ember-50 text-ember-500 flex items-center justify-center"><Icons.Fire className="w-5 h-5" /></div><div><h3 className="font-display font-bold text-lg text-bark-900 leading-tight">たきび広場</h3><p className="text-xs text-bark-400 font-bold">キャンパー同士の雑談・連絡板</p></div></div>
                  <span className="text-xs font-bold text-bark-400 bg-canvas border border-bark-200 px-3 py-1.5 rounded-full">{chatMessages.length}件</span>
                </div>
                <div ref={chatScrollRef} className="flex-1 overflow-y-auto scroll-soft p-4 sm:p-5 space-y-4 bg-canvas/40">
                  {chatMessages.length === 0 ? (
                    <div className="text-center py-16 text-bark-400 font-bold">まだ会話はありません。<br/><span className="text-sm">たきびの周りで挨拶するようにメッセージをどうぞ！</span></div>
                  ) : chatMessages.map(m => {
                    const mine = m.userId===user?.uid;
                    return (
                      <div key={m.id} className={`flex items-end gap-2.5 ${mine ? 'flex-row-reverse' : ''}`}>
                        <Avatar color={m.avatarColor} name={m.userName} size="w-9 h-9" text="text-sm" />
                        <div className={`flex flex-col max-w-[76%] ${mine ? 'items-end' : 'items-start'}`}>
                          <span className="text-[11px] font-bold text-bark-400 mb-1 px-1">{m.userName}{mine && '（あなた）'}</span>
                          <div className="flex items-end gap-1.5">
                            {isAdmin && <button onClick={() => handleDeleteChat(m.id)} className="text-ember-400 p-1 order-last hover:bg-ember-50 rounded-lg"><Icons.Trash className="w-4 h-4" /></button>}
                            <div className={`px-4 py-3 text-[15px] leading-relaxed font-medium ${mine ? 'bg-pine-700 text-white rounded-2xl rounded-br-md' : 'bg-white border border-bark-200 text-bark-800 rounded-2xl rounded-bl-md'}`}><p className="whitespace-pre-wrap break-words">{m.message}</p></div>
                          </div>
                          <span className="text-[10px] font-bold text-bark-300 mt-1 px-1">{m.createdAt ? new Date(m.createdAt).toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'}) : ''}</span>
                        </div>
                      </div>
                    );
                  })}
                </div>
                <form onSubmit={handleSendMessage} className="p-3.5 border-t border-bark-100 flex gap-2 shrink-0">
                  <input type="text" value={newMessage} onChange={e => setNewMessage(e.target.value)} placeholder="メッセージを送信…" className={inputCls} />
                  <button type="submit" disabled={!newMessage.trim()} className="shrink-0 w-14 bg-pine-700 hover:bg-pine-600 disabled:bg-bark-200 disabled:text-bark-400 text-white font-bold rounded-2xl transition flex items-center justify-center"><Icons.Right className="w-5 h-5" /></button>
                </form>
              </div>
            )}

            {/* ---------------- PROFILE / SETTINGS ---------------- */}
            {activeTab === 'profile' && (
              <div className="max-w-xl mx-auto space-y-5 anim-fade">

                {isAdmin && (
                  <div className="bg-pine-800 text-white rounded-4xl p-6 shadow-lift space-y-6">
                    <div className="flex items-center gap-2"><span className="text-xl">👑</span><h3 className="font-display font-bold text-xl">管理者システム設定</h3></div>
                    <form onSubmit={handleUpdateAdmin} className="space-y-4">
                      <div className="grid grid-cols-2 gap-3">
                        <label className="block"><span className="block text-xs font-bold text-pine-200 mb-1.5">管理者ID</span><input type="text" required value={adminForm.adminId} onChange={e => setAdminForm({ ...adminForm, adminId:e.target.value })} className="w-full px-4 py-3 bg-pine-900/60 border border-pine-700 rounded-2xl text-white font-bold outline-none focus:border-pine-400" /></label>
                        <label className="block"><span className="block text-xs font-bold text-pine-200 mb-1.5">パスワード</span><input type="password" required value={adminForm.adminPassword} onChange={e => setAdminForm({ ...adminForm, adminPassword:e.target.value })} className="w-full px-4 py-3 bg-pine-900/60 border border-pine-700 rounded-2xl text-white font-bold outline-none focus:border-pine-400" /></label>
                      </div>
                      <label className="block"><span className="block text-xs font-bold text-pine-200 mb-1.5">表示名</span><input type="text" required value={adminForm.adminName} onChange={e => setAdminForm({ ...adminForm, adminName:e.target.value })} className="w-full px-4 py-3 bg-pine-900/60 border border-pine-700 rounded-2xl text-white font-bold outline-none focus:border-pine-400" /></label>
                      <button type="submit" className="w-full py-3.5 bg-white text-pine-800 font-bold rounded-2xl transition hover:bg-pine-50">設定を保存</button>
                    </form>
                  </div>
                )}

                {isAdmin && (
                  <div className="bg-white border border-bark-200 rounded-4xl p-6 shadow-soft space-y-4">
                    <div className="flex items-center gap-2"><Icons.Bell className="w-5 h-5 text-ember-500" /><h3 className="font-display font-bold text-lg text-bark-900">お知らせを投稿</h3></div>
                    <form onSubmit={handlePostAnnouncement} className="space-y-3">
                      <input type="text" required placeholder="タイトル（例：花火大会のお知らせ）" value={annForm.title} onChange={e => setAnnForm({ ...annForm, title:e.target.value })} className={inputCls} />
                      <textarea required rows="3" placeholder="本文を入力…" value={annForm.body} onChange={e => setAnnForm({ ...annForm, body:e.target.value })} className={`${inputCls} resize-none`} />
                      <button type="submit" className="w-full py-3.5 bg-ember-500 hover:bg-ember-600 text-white font-bold rounded-2xl transition">お知らせを配信</button>
                    </form>
                  </div>
                )}

                {/* save data */}
                <div className="bg-white border border-bark-200 rounded-4xl p-6 shadow-soft space-y-4">
                  <h3 className="font-display font-bold text-lg text-bark-900">🔒 セーブデータの同期</h3>
                  <p className="text-sm text-bark-500 font-medium leading-relaxed">Googleアカウントを連携すると、予約やプロフィールをクラウドへ安全に同期できます。</p>
                  {profile.googleLinked ? (
                    <div className="bg-canvas border border-bark-200 rounded-3xl p-4 flex items-center justify-between gap-3">
                      <div className="flex items-center gap-3 min-w-0"><div className="w-10 h-10 rounded-2xl bg-white border border-bark-200 flex items-center justify-center shrink-0"><Icons.Google className="w-5 h-5" /></div><div className="min-w-0"><p className="font-bold text-bark-900 text-sm">連携済み</p><p className="text-xs text-bark-400 font-medium truncate">{profile.googleEmail}</p></div></div>
                      <button onClick={handleSignOut} className="shrink-0 px-4 py-2.5 bg-bark-100 hover:bg-bark-200 text-bark-700 rounded-xl text-sm font-bold transition">ログアウト</button>
                    </div>
                  ) : (
                    <button onClick={handleGoogleLink} className="w-full py-3.5 bg-white border border-bark-300 hover:border-pine-400 text-bark-800 font-bold rounded-2xl shadow-soft transition flex items-center justify-center gap-3"><Icons.Google className="w-5 h-5" />Googleでデータを同期</button>
                  )}
                  <div className="pt-4 border-t border-bark-100 flex items-center justify-between gap-3">
                    <div><p className="text-sm font-bold text-bark-700">管理スタッフの方</p><p className="text-xs text-bark-400 font-medium">専用IDでログインできます</p></div>
                    {isAdmin ? <button onClick={handleAdminLogout} className="shrink-0 px-4 py-2.5 bg-ember-50 text-ember-600 border border-ember-200 rounded-xl text-sm font-bold transition">管理者終了</button>
                             : <button onClick={() => { setAdminForm(adminCredentials); setShowAdminModal(true); }} className="shrink-0 px-4 py-2.5 bg-bark-100 hover:bg-bark-200 text-bark-700 rounded-xl text-sm font-bold transition">管理者ログイン</button>}
                  </div>
                </div>

                {/* profile edit */}
                <div className="bg-white border border-bark-200 rounded-4xl p-6 shadow-soft space-y-5">
                  <div className="text-center"><h2 className="font-display font-bold text-2xl text-bark-900">プロフィール</h2><p className="text-sm text-bark-500 font-medium mt-1">チャットや企画で共有されます。</p></div>
                  <form onSubmit={handleUpdateProfile} className="space-y-5">
                    <div>
                      <span className="block text-sm font-bold text-bark-600 mb-3 text-center">アバターカラー</span>
                      <div className="flex justify-center gap-3">
                        {AVATAR_COLORS.map(c => (
                          <button key={c} type="button" onClick={() => setProfile({ ...profile, avatarColor:c })} className={`w-12 h-12 rounded-2xl ${c} flex items-center justify-center text-white font-bold transition ${profile.avatarColor===c ? 'ring-2 ring-offset-2 ring-pine-500 scale-105' : ''}`}>{(profile.nickname || 'G').charAt(0).toUpperCase()}</button>
                        ))}
                      </div>
                    </div>
                    <Field label="ニックネーム"><input type="text" required value={profile.nickname} onChange={e => setProfile({ ...profile, nickname:e.target.value })} placeholder="例：カブトムシハンター" className={inputCls} /></Field>
                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                      <Field label="キャンプスタイル">
                        <select value={profile.campStyle} onChange={e => setProfile({ ...profile, campStyle:e.target.value })} className={inputCls}>
                          <option>ファミリー（みんなで）</option><option>ソロ（ひとりで）</option><option>デュオ（ふたりで）</option><option>グループ</option>
                        </select>
                      </Field>
                      <Field label="お気に入りの装備"><input type="text" value={profile.favoriteGear} onChange={e => setProfile({ ...profile, favoriteGear:e.target.value })} placeholder="例：コールマンランタン" className={inputCls} /></Field>
                    </div>
                    <Field label="自己紹介"><textarea rows="3" value={profile.bio} onChange={e => setProfile({ ...profile, bio:e.target.value })} placeholder="よろしくお願いします！" className={`${inputCls} resize-none`} /></Field>
                    <button type="submit" className="w-full py-4 bg-pine-700 hover:bg-pine-600 text-white font-bold text-lg rounded-2xl shadow-soft transition">変更内容を保存する</button>
                  </form>
                </div>
              </div>
            )}

            {/* ---------------- GUIDE ---------------- */}
            {activeTab === 'guide' && (
              <div className="space-y-5 anim-fade">
                <div className="bg-pine-800 text-white rounded-4xl p-6 sm:p-8 shadow-lift relative overflow-hidden">
                  <div className="absolute -right-4 -bottom-6 text-pine-700/50"><Icons.Logo className="w-40 h-40" /></div>
                  <div className="relative space-y-4">
                    <h2 className="font-display font-bold text-2xl sm:text-3xl">クワカブキャンプ場<br/>ガイドマップ</h2>
                    <div className="space-y-2 text-sm font-medium text-pine-100">
                      <p className="flex items-center gap-2"><Icons.Pin className="w-4 h-4 text-pine-300 shrink-0" />北海道北広島市大曲</p>
                      <p className="flex items-center gap-2"><span className="w-4 text-center shrink-0">🚃</span>JR千歳線「上野幌駅」から徒歩約10分</p>
                    </div>
                  </div>
                </div>

                <div className="bg-white border border-bark-200 rounded-4xl p-6 shadow-soft">
                  <p className="text-bark-600 font-medium leading-relaxed">「北広島クワカブキャンプ場」は、札幌に隣接する北広島市大曲の豊かなシラカバ・コナラ林に位置するプライベート自然スペースです。駅から徒歩10分という抜群のアクセスでありながら、本格的な森林環境に包まれ、夏の昆虫採集や自然観察に最高です。</p>
                </div>

                <div className="grid grid-cols-1 sm:grid-cols-3 gap-3">
                  {SITE_TYPES.map(s => (
                    <div key={s.id} className="bg-white border border-bark-200 rounded-4xl p-5 shadow-soft space-y-2">
                      <div className="text-3xl">{s.icon}</div>
                      <div className="flex items-center gap-2"><span className={`w-2.5 h-2.5 rounded-full ${s.dot}`} /><h3 className="font-bold text-bark-900">{s.short}</h3></div>
                      <p className="text-sm text-bark-500 font-medium leading-relaxed">{s.desc}</p>
                    </div>
                  ))}
                </div>

                <div className="bg-white border border-bark-200 rounded-4xl p-6 shadow-soft space-y-4">
                  <h3 className="font-display font-bold text-lg text-bark-900">⚠️ ご利用ルール</h3>
                  <ul className="space-y-3">
                    <li className="flex items-start gap-3 text-sm text-bark-600 font-medium"><span className="w-6 h-6 rounded-lg bg-pine-50 text-pine-600 flex items-center justify-center shrink-0"><Icons.Check className="w-4 h-4" /></span><span><strong className="text-bark-800">消灯時間（22時）：</strong>静寂の森を守るため、消灯以降はお静かにお過ごしください。</span></li>
                    <li className="flex items-start gap-3 text-sm text-bark-600 font-medium"><span className="w-6 h-6 rounded-lg bg-pine-50 text-pine-600 flex items-center justify-center shrink-0"><Icons.Check className="w-4 h-4" /></span><span><strong className="text-bark-800">自然環境の保護：</strong>白樺の樹皮を剥がしたり、トラップの放置はお控えください。</span></li>
                  </ul>
                </div>

                <p className="text-center text-xs font-bold text-bark-400 pt-2">© 2026 CAMP LINK Co., Ltd.</p>
              </div>
            )}
          </main>

          {/* ================= Bottom Nav ================= */}
          <nav className="fixed nav-bottom inset-x-0 z-50 px-3 pointer-events-none">
            <div className="max-w-md mx-auto bg-white/95 backdrop-blur-xl border border-bark-200 rounded-3xl shadow-navbar flex p-1.5 pointer-events-auto">
              {tabs.map(t => { const on = activeTab===t.id; return (
                <button key={t.id} onClick={() => setActiveTab(t.id)} className={`flex-1 flex flex-col items-center gap-1 py-2 rounded-2xl transition ${on ? 'bg-pine-700 text-white' : 'text-bark-400 active:bg-bark-50'}`}>
                  <t.Icon className="w-[22px] h-[22px]" />
                  <span className="text-[10px] font-bold leading-none">{t.label}</span>
                </button>
              ); })}
            </div>
          </nav>

          {/* ================= Reservation modal ================= */}
          {isModalOpen && (() => {
            const taken = new Set(reservations.filter(r => r.date===selectedDate && r.id!==resForm.id).map(r => r.siteType));
            const d = selectedDate ? new Date(selectedDate) : null;
            const canEdit = !resForm.id || (reservations.find(r => r.id===resForm.id)?.userId===user?.uid || isAdmin);
            return (
              <div className="fixed inset-0 z-[70] bg-bark-900/40 backdrop-blur-sm flex items-end sm:items-center justify-center p-0 sm:p-6">
                <div className="bg-paper w-full sm:max-w-lg rounded-t-4xl sm:rounded-4xl overflow-hidden shadow-lift anim-sheet max-h-[92dvh] flex flex-col">
                  <div className="bg-white px-6 py-5 border-b border-bark-100 flex items-center justify-between gap-3 shrink-0">
                    <div>
                      <h3 className="font-display font-bold text-xl text-bark-900">{resForm.id ? '予約の編集' : '宿泊予約'}</h3>
                      {d && <p className="text-sm font-bold text-pine-600 mt-0.5">{d.getFullYear()}年{d.getMonth()+1}月{d.getDate()}日（{SHORT_W[d.getDay()]}）</p>}
                    </div>
                    <button onClick={() => setIsModalOpen(false)} className="w-9 h-9 rounded-xl bg-bark-100 text-bark-500 flex items-center justify-center"><Icons.X className="w-5 h-5" /></button>
                  </div>

                  <form onSubmit={handleSaveReservation} className="overflow-y-auto scroll-soft flex-1">
                    <div className="p-6 space-y-6">
                      <div>
                        <span className="block text-sm font-bold text-bark-600 mb-3">利用エリアをえらぶ</span>
                        <div className="space-y-2.5">
                          {SITE_TYPES.map(s => { const isTaken = taken.has(s.id); const sel = resForm.siteType===s.id; return (
                            <button type="button" key={s.id} disabled={isTaken} onClick={() => setResForm({ ...resForm, siteType:s.id })}
                              className={`w-full flex items-center gap-3 p-4 rounded-3xl border-2 text-left transition ${sel ? 'border-pine-600 bg-pine-50' : isTaken ? 'border-bark-200 bg-bark-50 opacity-60' : 'border-bark-200 bg-white hover:border-pine-300'}`}>
                              <span className="text-2xl shrink-0">{s.icon}</span>
                              <div className="min-w-0 flex-1"><div className="font-bold text-bark-900">{s.short}</div><div className="text-xs text-bark-500 font-medium truncate">{s.desc}</div></div>
                              {isTaken ? <span className="text-xs font-bold text-bark-400 shrink-0">満室</span>
                                       : sel ? <span className="w-6 h-6 rounded-full bg-pine-600 text-white flex items-center justify-center shrink-0"><Icons.Check className="w-4 h-4" /></span>
                                             : <span className="text-xs font-bold text-pine-600 shrink-0">空き</span>}
                            </button>
                          ); })}
                        </div>
                      </div>
                      <div className="grid grid-cols-2 gap-4">
                        <div><span className="block text-sm font-bold text-bark-600 mb-2">泊数</span><Stepper value={resForm.nights} onChange={v => setResForm({ ...resForm, nights:v })} min={1} max={7} suffix="泊" /></div>
                        <div><span className="block text-sm font-bold text-bark-600 mb-2">人数</span><Stepper value={resForm.guestCount} onChange={v => setResForm({ ...resForm, guestCount:v })} min={1} max={10} suffix="名" /></div>
                      </div>
                      <Field label="ご要望・メッセージ（任意）"><textarea value={resForm.memo} onChange={e => setResForm({ ...resForm, memo:e.target.value })} rows="3" placeholder="チェックイン時間のご相談やご質問があればどうぞ。" className={`${inputCls} resize-none`} /></Field>
                    </div>
                    <div className="sticky bottom-0 bg-white border-t border-bark-100 p-4 flex gap-3 safe-bottom">
                      {resForm.id && canEdit && (
                        <button type="button" onClick={() => handleDeleteReservation(resForm.id)} className="px-4 py-3.5 bg-ember-50 text-ember-600 border border-ember-200 rounded-2xl font-bold flex items-center gap-2 shrink-0"><Icons.Trash className="w-5 h-5" /></button>
                      )}
                      <button type="submit" className="flex-1 py-3.5 bg-pine-700 hover:bg-pine-600 text-white font-bold text-lg rounded-2xl shadow-soft transition">{resForm.id ? '保存する' : '予約を確定する'}</button>
                    </div>
                  </form>
                </div>
              </div>
            );
          })()}

        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
