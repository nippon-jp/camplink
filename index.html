    // --- ヘルパー関数群 ---
    const getDaysInMonth = (date) => {
      const year = date.getFullYear();
      const month = date.getMonth();
      const days = new Date(year, month + 1, 0).getDate();
      const firstDayIndex = new Date(year, month, 1).getDay();
      
      const daysArray = [];
      for (let i = 0; i < firstDayIndex; i++) {
        daysArray.push(null);
      }
      for (let i = 1; i <= days; i++) {
        daysArray.push(new Date(year, month, i));
      }
      return daysArray;
    };

    const getDaysInWeek = (date) => {
      const current = new Date(date);
      const dayOfWeek = current.getDay();
      const sunday = new Date(current);
      sunday.setDate(current.getDate() - dayOfWeek);
      
      const week = [];
      for (let i = 0; i < 7; i++) {
        const d = new Date(sunday);
        d.setDate(sunday.getDate() + i);
        week.push(d);
      }
      return week;
    };

    const formatDateString = (date) => {
      if (!date) return '';
      const y = date.getFullYear();
      const m = String(date.getMonth() + 1).padStart(2, '0');
      const d = String(date.getDate()).padStart(2, '0');
      return `${y}-${m}-${d}`;
    };

                      <div className="text-xs sm:text-sm text-amber-950 leading-relaxed font-bold">
                        🏕️ いまは「おためし用アカウント」だよ。Googleアカウントとつなげてバックアップしよう！
                      </div>
                      <button
                        type="button"
                        onClick={handleGoogleLink}
                        className="w-full sm:w-auto px-6 py-3 bg-white hover:bg-stone-50 text-stone-700 font-black rounded-2xl shadow-md border-2 border-stone-300 transition-all duration-200 flex items-center justify-center gap-3 mx-auto hover-wiggle"
                      >
                        <Icons.Google />
                        <span>Google（グーグル）でログイン・つなげる</span>
                      </button>
                    </div>
                  )}

                  <div className="mt-6 pt-6 border-t-2 border-stone-100 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-3">
                    <div>
                      <p className="text-xs font-black text-stone-600">🙋‍♂️ キャンプじょうのかんりスタッフの人へ</p>
                      <p className="text-[10px] text-stone-400 font-bold">ここからスタッフログインができるよ！</p>
                    </div>
                    {isAdmin ? (
                      <button
                        type="button"
                        onClick={handleAdminLogout}
                        className="px-4 py-2 bg-red-600 hover:bg-red-700 text-white text-xs font-black rounded-xl transition shadow-sm"
                      >
                        かんりしゃモード解除（おわる）
                      </button>
                    ) : (
                      <button
                        type="button"
                        onClick={() => setShowAdminModal(true)}
                        className="px-4 py-2 bg-stone-900 hover:bg-stone-800 text-white text-xs font-black rounded-xl transition shadow-md hover-wiggle"
                      >
                        👑 かんりしゃログイン
                      </button>
                    )}
                  </div>
                </div>

                {/* プロフィール詳細フォーム */}
                <div className="bg-white p-6 sm:p-8 rounded-[30px] border-4 border-stone-200 shadow-sm space-y-6">
                  <div className="text-center">
                    <h2 className="text-xl sm:text-2xl font-black text-stone-800">⛺ じぶんのプロフィールをつくろう！</h2>
                    <p className="text-xs sm:text-sm text-stone-500 font-bold mt-1.5">おともだちに見せたいなまえや、じぶんのすきなキャンプ道具をかこう！</p>
                  </div>

                  <form onSubmit={handleUpdateProfile} className="space-y-6">
                    {/* アバター選択 */}
                    <div>
                      <label className="block text-center text-xs font-black text-stone-500 mb-2">● すきなキャラクターのいろをえらんでね</label>
                      <div className="flex justify-center flex-wrap gap-4 py-2">
                        {['bg-emerald-600', 'bg-amber-600', 'bg-blue-600', 'bg-indigo-600', 'bg-orange-600'].map((color) => (
                          <button
                            key={color}
                            type="button"
                            onClick={() => setProfile({ ...profile, avatarColor: color })}
                            className={`w-14 h-14 rounded-full ${color} flex items-center justify-center text-white font-black text-xl ring-offset-2 transition-all duration-150 border-2 border-white shadow-md ${
                              profile.avatarColor === color ? 'ring-4 ring-emerald-500 scale-110' : 'hover:scale-105'
                            }`}
                          >
                            {(profile.nickname || 'G').charAt(0).toUpperCase()}
                          </button>
                        ))}
                      </div>
                    </div>

                    <div>
                      <label className="block text-sm font-black text-stone-700 mb-1">📛 なまえ（ニックネーム）</label>
                      <input
                        type="text"
                        required
                        value={profile.nickname}
                        onChange={(e) => setProfile({ ...profile, nickname: e.target.value })}
                        placeholder="例：カブトムシマスター"
                        className="w-full px-4 py-3 border-2 border-stone-200 rounded-2xl outline-none font-bold transition focus:border-emerald-600"
                      />
                    </div>

                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                      <div>
                        <label className="block text-sm font-black text-stone-700 mb-1">🌲 キャンプスタイル（どんなキャンプ？）</label>
                        <select
                          value={profile.campStyle}
                          onChange={(e) => setProfile({ ...profile, campStyle: e.target.value })}
                          className="w-full px-4 py-3 border-2 border-stone-200 rounded-2xl outline-none font-bold transition bg-white"
                        >
                          <option value="ソロ">ソロ（ひとりで）</option>
                          <option value="ファミリー（みんなで）">ファミリー（かぞくみんなで）</option>
                          <option value="グループ">グループ（おともだちと）</option>
                        </select>
                      </div>

                      <div>
                        <label className="block text-sm font-black text-stone-700 mb-1">🎒 お気に入りのキャンプどうぐ</label>
                        <input
                          type="text"
                          value={profile.favoriteGear}
                          onChange={(e) => setProfile({ ...profile, favoriteGear: e.target.value })}
                          placeholder="例：クワガタ用のむしかご"
                          className="w-full px-4 py-3 border-2 border-stone-200 rounded-2xl outline-none font-bold transition"
                        />
                      </div>
                    </div>

                    <div>
                      <label className="block text-sm font-black text-stone-700 mb-1">💬 自己紹介（みんなにひとこと！）</label>
                      <textarea
                        value={profile.bio}
                        onChange={(e) => setProfile({ ...profile, bio: e.target.value })}
                        rows="3"
                        placeholder="例：カブトムシを3匹つかまえるのが目標です！仲良くしてください！"
                        className="w-full px-4 py-3 border-2 border-stone-200 rounded-2xl outline-none font-bold transition resize-none focus:border-emerald-600"
                      />
                    </div>

                    <button
                      type="submit"
                      className="w-full py-4.5 bg-emerald-800 hover:bg-emerald-700 text-white font-black rounded-2xl shadow-md transition-all duration-200 flex items-center justify-center gap-2 hover-wiggle"
                    >
                      <span>プロフィールをセーブする！ 💾</span>
                    </button>
                  </form>
                </div>
              </div>
            )}

            {/* 5. キャンプ場ガイド タブ */}
            {activeTab === 'guide' && (
              <div className="space-y-6">
                <div className="bg-white p-6 sm:p-8 rounded-[30px] border-4 border-stone-200 shadow-sm space-y-6">
                  <h2 className="text-xl sm:text-2xl font-black text-emerald-950 flex items-center gap-2">
                    <span>🌲 クワカブキャンプ場のひみつガイド</span>
                  </h2>
                  
                  <div className="bg-stone-100 p-4 rounded-2xl border-2 border-stone-200 text-xs sm:text-sm text-stone-700 font-bold space-y-2">
                    <p className="flex items-center gap-2">
                      <span className="text-emerald-800">📍 ばしょ:</span>
                      <span>北海道北広島市大曲（ほっかいどう きたひろしまし おおまがり）</span>
                    </p>
                    <p className="flex items-center gap-2">
                      <span className="text-emerald-800">🚃 でんしゃでの行き方:</span>
                      <span>「上野幌（かみのっぽろ）えき」から あるいて10分！</span>
                    </p>
                  </div>

                  <p className="text-stone-600 text-sm leading-relaxed font-semibold">
                    「北広島クワカブキャンプ場」は、しぜんがいっぱいのキャンプじょうだよ！
                    でんしゃの駅（えき）から10分であるけるのに、森の中にはコナラやクヌギの大きな木がたくさんあって、夏にはたくさんのクワガタやカブトムシが集まるよ。
                    ミヤマクワガタやカブトムシを見つけて、しぜんのなかでいっぱいあそぼう！🌳✨
                  </p>

                  <div className="grid grid-cols-1 md:grid-cols-3 gap-6 pt-4">
                    <div className="border-2 border-teal-200 bg-teal-50/20 p-5 rounded-2xl">
                      <h3 className="font-black text-teal-900 mb-2 flex items-center gap-1.5 text-sm sm:text-base">
                        <span className="w-3 h-3 rounded-full bg-teal-500"></span>
                        🚌＋⛺ スペシャルセット
                      </h3>
                      <p className="text-xs text-stone-600 font-bold leading-relaxed">
                        エアコンがあるきれいで涼しい「くるまのおうち」と、お外にテントをはる場所がセットになったスペシャルな場所だよ！
                      </p>
                    </div>

                    <div className="border-2 border-indigo-200 bg-indigo-50/20 p-5 rounded-2xl">
                      <h3 className="font-black text-indigo-900 mb-2 flex items-center gap-1.5 text-sm sm:text-base">
                        <span className="w-3 h-3 rounded-full bg-indigo-500"></span>
                        🚌 くるまのおうち
                      </h3>
                      <p className="text-xs text-stone-600 font-bold leading-relaxed">
                        雨の日でも、よるが寒くてもへっちゃら！ベッドもエアコンもある「くるまのおうち」だから、キャンプがはじめてでも安心して泊まれるよ！
                      </p>
                    </div>

                    <div className="border-2 border-emerald-200 bg-emerald-50/20 p-5 rounded-2xl">
                      <h3 className="font-black text-emerald-900 mb-2 flex items-center gap-1.5 text-sm sm:text-base">
                        <span className="w-3 h-3 rounded-full bg-emerald-500"></span>
                        ⛺ てんとのばしょ
                      </h3>
                      <p className="text-xs text-stone-600 font-bold leading-relaxed">
                        やわらかい芝生（しばふ）のうえに、じぶんのテントをはってね！よるは満点の星空（ほしぞら）がとってもきれいに見えるよ。🌟
                      </p>
                    </div>
                  </div>

                  {/* 昆虫採集のヒント */}
                  <div className="mt-8 border-t-2 border-stone-100 pt-6 bg-yellow-50/30 p-5 rounded-2xl border-2 border-yellow-200">
                    <h3 className="font-black text-amber-900 mb-3 text-sm sm:text-base">🦉 クワガタ・カブトムシをつかまえるヒント</h3>
                    <ul className="space-y-2 text-xs sm:text-sm text-stone-700 font-bold">
                      <li className="flex items-start gap-2">
                        <span className="text-yellow-600">🌲</span>
                        コナラやクヌギなどの「じゅえき（木のジュース）」がでている木を、ひるのうちにさがしておこう！
                      </li>
                      <li className="flex items-start gap-2">
                        <span className="text-yellow-600">💡</span>
                        夜になると、キャンプじょうのあかりや街灯（がいとう）に、クワガタが飛んでくることがあるよ！
                      </li>
                      <li className="flex items-start gap-2">
                        <span className="text-yellow-600">🍌</span>
                        バナナをネットにいれて、木につるす「バナナトラップ」も大人気！かんりしゃのお兄さんたちにやり方を聞いてみてね。
                      </li>
                    </ul>
                  </div>

                  {/* 利用ルール */}
                  <div className="mt-8 border-t-2 border-stone-100 pt-6">
                    <h3 className="font-black text-stone-800 mb-3 text-base">🏕️ キャンプじょうのやくそく（ルール）</h3>
                    <ul className="space-y-2.5 text-xs text-stone-600 font-bold">
                      <li className="flex items-start gap-2">
                        <span className="text-emerald-700">✔</span>
                        <strong>よる22時（10時）からはしずかに：</strong> 22時から朝の7時までは、みんながねむる時間だよ。しずかにすごそうね。
                      </li>
                      <li className="flex items-start gap-2">
                        <span className="text-emerald-700">✔</span>
                        <strong>木ややさしい虫たちを大切に：</strong> 木の皮（かわ）をはがしたり、木をきずつけたりしちゃダメだよ。虫たちも、つかまえるのは持ってかえるぶんだけにしてね。
                      </li>
                      <li className="flex items-start gap-2">
                        <span className="text-emerald-700">✔</span>
                        <strong>ごみはきちんとかたづけよう：</strong> しぜんをきれいにして、またあそびにこれるようにしよう！
                      </li>
                    </ul>
                  </div>
                </div>
              </div>
            )}
          </main>

          {/* 予約作成・編集ダイアログモーダル */}
          {isModalOpen && (
            <div className="fixed inset-0 z-50 bg-stone-900/60 flex items-center justify-center p-4 backdrop-blur-sm">
              <div className="bg-white rounded-3xl w-full max-w-md overflow-hidden shadow-2xl border-4 border-emerald-800 animate-fadeIn">
                {/* モーダルヘッダー */}
                <div className="bg-emerald-950 text-white p-5 flex justify-between items-center border-b-2 border-emerald-900">
                  <div>
                    <h3 className="font-black text-base sm:text-lg">
                      {reservationForm.id ? "✏️ よやくを変更する" : "📅 キャンプによやくする"}
                    </h3>
                    <p className="text-xs text-emerald-300 font-bold mt-0.5">日にち: {selectedDate}</p>
                  </div>
                  <button 
                    onClick={() => setIsModalOpen(false)}
                    className="text-emerald-200 hover:text-white font-black p-1 text-xl"
                  >
                    ✕
                  </button>
                </div>

                {/* モーダルコンテンツ */}
                <form onSubmit={handleSaveReservation} className="p-5 space-y-4 text-sm font-bold">
                  
                  {/* 区画選択 */}
                  <div>
                    <label className="block text-stone-700 mb-1">🏕️ どこに泊まる？（キャンプのばしょ）</label>
                    <select
                      value={reservationForm.siteType}
                      onChange={(e) => setReservationForm({ ...reservationForm, siteType: e.target.value })}
                      className="w-full px-4 py-3 border-2 border-stone-200 rounded-2xl outline-none transition bg-white"
                    >
                      {SITE_TYPES.map(site => (
                        <option key={site.id} value={site.id}>
                          {site.name}
                        </option>
                      ))}
                    </select>
                  </div>

                  {/* 宿泊日数 & 人数 */}
                  <div className="grid grid-cols-2 gap-4">
                    <div>
                      <label className="block text-stone-700 mb-1">📅 なんぱくする？</label>
                      <select
                        value={reservationForm.nights}
                        onChange={(e) => setReservationForm({ ...reservationForm, nights: Number(e.target.value) })}
                        className="w-full px-4 py-3 border-2 border-stone-200 rounded-2xl bg-white"
                      >
                        {[1, 2, 3, 4, 5].map(n => (
                          <option key={n} value={n}>{n} 泊する</option>
                        ))}
                      </select>
                    </div>
                    <div>
                      <label className="block text-stone-700 mb-1">👥 なんにんでいく？</label>
                      <select
                        value={reservationForm.guestCount}
                        onChange={(e) => setReservationForm({ ...reservationForm, guestCount: Number(e.target.value) })}
                        className="w-full px-4 py-3 border-2 border-stone-200 rounded-2xl bg-white"
                      >
                        {[1, 2, 3, 4, 5, 6, 7, 8].map(g => (
                          <option key={g} value={g}>{g} 名でいく</option>
                        ))}
                      </select>
                    </div>
                  </div>

                  {/* ご要望・メモ */}
                  <div>
                    <label className="block text-stone-700 mb-1">💬 かんりしゃの人へのメッセージ (任意)</label>
                    <textarea
                      value={reservationForm.memo}
                      onChange={(e) => setReservationForm({ ...reservationForm, memo: e.target.value })}
                      placeholder="例：カブトムシをつかまえるのを、みんな楽しみにしています！"
                      rows="3"
                      className="w-full px-4 py-3 border-2 border-stone-200 rounded-2xl outline-none transition resize-none focus:border-emerald-600"
                    />
                  </div>

                  {/* アクションボタン */}
                  <div className="pt-2 flex gap-2 justify-end items-center">
                    {/* 管理者、または本人の予約であればキャンセル（削除）ボタンを表示 */}
                    {(reservationForm.id && (reservations.find(r => r.id === reservationForm.id)?.userId === user?.uid || isAdmin)) && (
                      <button
                        type="button"
                        onClick={() => handleDeleteReservation(reservationForm.id)}
                        className="flex items-center gap-1.5 px-4 py-3 border-2 border-red-300 bg-red-50 text-red-700 hover:bg-red-100 rounded-2xl font-black transition mr-auto hover-wiggle"
                      >
                        <Icons.Trash />
                        <span>とりけす</span>
                      </button>
                    )}

                    <button
                      type="button"
                      onClick={() => setIsModalOpen(false)}
                      className="px-4 py-3 bg-stone-100 hover:bg-stone-200 text-stone-700 rounded-2xl font-black transition"
                    >
                      とじる
                    </button>
                    
                    <button
                      type="submit"
                      className="px-6 py-3 bg-emerald-800 hover:bg-emerald-700 text-white rounded-2xl font-black transition flex items-center gap-1.5 shadow-md hover-wiggle"
                    >
                      <span>{reservationForm.id ? "へんこうをセーブ" : "よやくする！ 🎉"}</span>
                    </button>
                  </div>

                </form>
              </div>
            </div>
          )}

          {/* フッター */}
          <footer className="bg-stone-800 text-stone-400 text-center py-8 border-t-4 border-stone-900 text-xs mt-auto font-bold space-y-1">
            <p>© 2026 CAMP LINK Co., Ltd. All Rights Reserved.</p>
            <p className="text-stone-500 text-[10px]">React & Tailwind CSS でうごく よやく・チャットアプリ</p>
          </footer>
        </div>
      );
    }

    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(<App />);
  </script>
</body>
</html>
